<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <span class="nav-title">MAPA <span class="nav-title-accent">INTERATIVO</span></span>

            <div class="nav-links">
                <a href="https://github.com/natanhnrqe" target="_blank" class="nav-icon" aria-label="GitHub">
                    <img src="images/github.png"  alt="GitHub">
                </a>
                <a href="https://www.linkedin.com/in/natannhenriquee/" target="_blank" class="nav-icon" aria-label="LinkedIn">
                    <img src="images/linkedin (1).png" alt="LinkedIn">
                </a>
            </div>
        </nav>
    </header>

    <main>
        <section class="mapa">
            <h2></h2>
        </section>

        <section class="mapas">
            <div id="mapa-container"><p id="mapa-loading" style="text-align:center;padding:2rem;color:#888;">Carregando mapa...</p></div>
        </section>

        <section class="info" id="info">
            <div id="conteudo-info">
                <p>Selecione um estado!!!</p>
            </div>
            <button id="voltar">Voltar ao mapa</button>
           
        </section>
    </main>
    <footer>
        <p>© 2025 Mapa Interativo. Todos os direitos reservados.</p>
    </footer>
    <script src="dados.js"></script>
    <script src="script.js" defer></script>
    

<script>
function loadMapa() {
  fetch('mapa.svg')
    .then(r => r.text())
    .then(svgText => {
      const container = document.getElementById('mapa-container');
      container.innerHTML = svgText;
      initMapaEventos();
    })
    .catch(() => {
      document.getElementById('mapa-container').innerHTML = '<p style="color:red">Erro ao carregar o mapa.</p>';
    });
}

if ('IntersectionObserver' in window) {
  const obs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      obs.disconnect();
      loadMapa();
    }
  }, { rootMargin: '300px' });
  obs.observe(document.getElementById('mapa-container'));
} else {
  window.addEventListener('load', loadMapa);
}
</script>
</body>
</html>
